name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 发版前先确认 OSS secrets + 写权限 + 公网可读，避免矩阵构建完成后才发现无法同步更新包
  check-oss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Require Aliyun OSS secrets
        shell: bash
        env:
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            ALIYUN_OSS_ACCESS_KEY_ID \
            ALIYUN_OSS_ACCESS_KEY_SECRET \
            ALIYUN_OSS_BUCKET \
            ALIYUN_OSS_ENDPOINT \
            ALIYUN_OSS_PUBLIC_BASE_URL
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::缺少 OSS secrets（发版前必须配置）: ${missing[*]}"
            exit 1
          fi

      - name: Install ali-oss
        run: npm install --no-save ali-oss@6

      - name: Probe Aliyun OSS (write + public read)
        env:
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL }}
        run: node scripts/check-aliyun-oss.mjs

  build:
    needs: check-oss
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version to project files
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const v = process.env.VERSION;
          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = v;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
          let cargo = fs.readFileSync('Cargo.toml', 'utf8');
          cargo = cargo.replace(/^version = "[^"]+"/m, `version = "${v}"`);
          fs.writeFileSync('Cargo.toml', cargo);
          console.log(`Synced app version to ${v}`);
          EOF

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION;
          const text = fs.readFileSync('CHANGELOG.md', 'utf8');
          const escaped = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp(
            `^## \\[${escaped}\\][^\\n]*\\n([\\s\\S]*?)(?=\\n---\\s*\\n|\\n## \\[|\\z)`,
            'm',
          );
          const match = text.match(re);
          if (!match) {
            console.error(`::error::CHANGELOG.md 中未找到 ## [${version}] 段落，请先补充后再打 tag。`);
            process.exit(1);
          }
          const body = match[1].trim();
          const delimiter = 'CHANGELOG_EOF';
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `body<<${delimiter}\n${body}\n${delimiter}\n`,
          );
          console.log(`已从 CHANGELOG.md 提取 v${version} 发布说明（${body.split('\n').length} 行）`);
          EOF

      - name: Prepare Tauri signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          KEY_PASSWORD: ${{ secrets.UPDATER_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/prepare-tauri-signing-key.sh

      # 将 OSS 公网 latest.json 写入 updater.endpoints 首项（与 ALIYUN_OSS_PUBLIC_BASE_URL 一致）
      - name: Inject OSS updater endpoint
        shell: bash
        env:
          PUBLIC_BASE: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PUBLIC_BASE:-}" ]; then
            echo "::error::缺少 secret ALIYUN_OSS_PUBLIC_BASE_URL（客户端 updater 首项依赖此值）"
            exit 1
          fi
          node <<'EOF'
          const fs = require('fs');
          const base = process.env.PUBLIC_BASE.replace(/\/+$/, '');
          const oss = `${base}/omnipanel/releases/latest.json`;
          const p = 'src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(p, 'utf8'));
          conf.plugins.updater.endpoints = [
            oss,
            'https://xget.xi-xu.me/gh/chaojimct/omnipanel/releases/latest/download/latest.json',
            'https://github.com/OmniUltraX/omnipanel/releases/latest/download/latest.json',
          ];
          fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          console.log('updater endpoints:', conf.plugins.updater.endpoints);
          EOF

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 使用仓库内已提交的 bindings.ts，避免 Windows 上 prebuild→cargo run 栈溢出
          SKIP_GEN_BINDINGS: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OmniPanel v${{ steps.version.outputs.version }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
      - name: Broadcast version to WeChat via OmniServer
        # 仅在 Windows 产物构建成功后广播一次，避免矩阵多平台重复通知
        if: success() && matrix.platform == 'windows-latest'
        shell: bash
        env:
          BASE_URL: ${{ secrets.OMNISERVER_BASE_URL }}
          TOKEN: ${{ secrets.OMNISERVER_ADMIN_TOKEN }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ] || [ -z "${TOKEN:-}" ]; then
            echo "缺少 OMNISERVER_BASE_URL / OMNISERVER_ADMIN_TOKEN"
            exit 1
          fi
          CHANGELOG="$(git log -1 --pretty=%B | sed -e 's/[[:space:]]*$//')"
          BODY=$(jq -nc \
            --arg version "${VERSION}" \
            --arg changelog "${CHANGELOG}" \
            --arg url "https://github.com/${REPO}/commit/${SHA}" \
            --arg title "新版本发布：${VERSION}" \
            '{
              version: $version,
              title: $title,
              changelog: $changelog,
              content_url: $url,
              dry_run: false
            }')
          curl -fsS -X POST "${BASE_URL%/}/broadcast/version" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${BODY}"

  # 全平台构建成功后，将 Release 资产同步到阿里云 OSS（客户端优先从此下载）
  publish-oss:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Require Aliyun OSS secrets
        shell: bash
        env:
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            ALIYUN_OSS_ACCESS_KEY_ID \
            ALIYUN_OSS_ACCESS_KEY_SECRET \
            ALIYUN_OSS_BUCKET \
            ALIYUN_OSS_ENDPOINT \
            ALIYUN_OSS_PUBLIC_BASE_URL
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::缺少 OSS secrets（发版不可静默跳过）: ${missing[*]}"
            exit 1
          fi

      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir release-assets
          ls -la release-assets

      - name: Install ali-oss
        run: npm install --no-save ali-oss@6

      - name: Publish updater assets to Aliyun OSS
        env:
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL }}
        run: |
          node scripts/publish-updater-to-aliyun-oss.mjs \
            --dir release-assets \
            --tag "${{ github.ref_name }}" \
            --repo "${{ github.repository }}"