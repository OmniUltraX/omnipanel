name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version to project files
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const v = process.env.VERSION;
          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = v;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
          let cargo = fs.readFileSync('Cargo.toml', 'utf8');
          cargo = cargo.replace(/^version = "[^"]+"/m, `version = "${v}"`);
          fs.writeFileSync('Cargo.toml', cargo);
          console.log(`Synced app version to ${v}`);
          EOF

      - name: Prepare Tauri signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          KEY_PASSWORD: ${{ secrets.UPDATER_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${RAW_KEY:-}" ]; then
            echo "::error::GitHub Secret UPDATER_PRIVATE_KEY 未配置。"
            echo "请执行: cd frontend && npm run tauri signer generate -w tauri-signing.key"
            echo "将生成的 .key 文件**完整内容**（含 untrusted comment 行）粘贴到 Secret。"
            exit 1
          fi
          KEY_FILE="${RUNNER_TEMP}/tauri-signing.key"
          printf '%s\n' "$RAW_KEY" > "$KEY_FILE"
          if ! grep -q 'untrusted comment:' "$KEY_FILE"; then
            if printf '%s' "$RAW_KEY" | base64 -d > "$KEY_FILE" 2>/dev/null \
              && grep -q 'untrusted comment:' "$KEY_FILE"; then
              echo "UPDATER_PRIVATE_KEY 已从 base64 解码"
            else
              echo "::error::UPDATER_PRIVATE_KEY 格式无效（Missing comment in secret key）。"
              echo "常见原因：只粘贴了密钥中间一行、粘贴了公钥、或换行丢失。"
              echo "修复：将 .key 全文粘贴到 Secret，或执行 base64 -w0 tauri-signing.key 后存入 Secret。"
              exit 1
            fi
          fi
          chmod 600 "$KEY_FILE"
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_FILE" >> "$GITHUB_ENV"
          if [ -n "${KEY_PASSWORD:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OmniPanel v${{ steps.version.outputs.version }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}