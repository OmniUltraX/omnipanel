<!doctype html>
<html lang="zh-CN" spellcheck="false" autocomplete="off">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo/omni.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <title>OmniPanel</title>
    <style>
      /* 仅同色底，真正启动 UI 只由 React SplashScreen 负责，避免双套样式 */

        margin: 0;
        height: 100%;
        background: #0e1419;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0e1419;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
